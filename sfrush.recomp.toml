# N64Recomp configuration for San Francisco Rush: Extreme Racing (USA)
# Midway / Atari Games - 1997

[input]
entrypoint = 0x80000400
rom_file_path = "sfrush_recomp.z64"
symbols_file_path = "symbols/sfrush.us.syms.toml"
output_func_path = "RecompiledFuncs"
functions_per_output_file = 50
single_file_output = false
uses_mips3_float_mode = true

# Patches section
[patches]
stubs = [
    # =========================================================================
    # Hardware register access (CACHE, TLB, COP0, PI, VI, AI, SI, SP, MI)
    # These are N64 hardware operations reimplemented by ultramodern/librecomp
    # =========================================================================
    "func_800040B0",   # PI status read (osPiGetStatus)
    "func_800040B8",   # PI status wait + uncached ROM read
    "func_80004650",   # CACHE: osInvalDCache
    "func_800046D0",   # CACHE: osInvalICache
    "func_80004F90",   # COP0+MI: interrupt mask (__osSetIntMask-like)
    "func_800054B0",   # CACHE: osWritebackDCache
    "func_80006DC0",   # 64-bit FPU (trunc.l, cvt.l, dmfc1/dmtc1) + COP0 calls
    "func_80007F4C",   # AI: osAiSetNextBuffer
    "func_8000A1F0",   # AI: osAiSetFrequency
    "func_8000A2A0",   # AI: osAiGetLength
    "func_8000D870",   # COP0: MTC0 (write Status register)
    "func_8000D880",   # COP0: MFC0 (read Status register)
    "func_8000D8F0",   # COP0+HW: massive interrupt handler (MI,SP,VI,AI,SI,PI)
    "func_8000DE84",   # Cross-branch function
    "func_8000DF6C",   # COP0+MI: __osDisableInt-like
    "func_8000E0C4",   # COP0+MI: __osRestoreInt-like / TLB
    "func_8000E250",   # CACHE: writeback
    "func_8000E2D0",   # TLB: probe (TLBP)
