# N64Recomp configuration for San Francisco Rush: Extreme Racing (USA)
# Midway / Atari Games - 1997

[input]
entrypoint = 0x80000400
rom_file_path = "sfrush_recomp.z64"
symbols_file_path = "symbols/sfrush.us.syms.toml"
output_func_path = "RecompiledFuncs"
functions_per_output_file = 50
single_file_output = false
uses_mips3_float_mode = true

[patches]
# Stubbed functions: generate empty bodies (for functions we don't redirect)
stubs = [
    # func_800005D8 — now un-ignored, runs natively with LZSS decompressor stubbed
    #"func_800005D8",   # LZSS decompress thread — custom impl in game_init_stubs.cpp (linked via /FORCE:MULTIPLE)
    "func_8000D8F0",   # Massive interrupt handler — too complex to redirect
    "func_8000DE84",   # Cross-branch function
    "func_8000DF6C",   # __osDisableInt variant with MI access
    "func_8000E0C4",   # __osRestoreInt variant with TLB
    "func_800162CC",   # Massive OS init (23KB, RSP+TLB+cache+everything)
    "func_80015850",   # COP0 Compare register write
    "func_80003B18",   # LZSS decompressor — data pre-loaded by on_game_init
    "func_800C38A0",   # Game code: invalid instruction
    # Hardware register access functions that don't have direct ultramodern equivalents
    "func_8000D8A0",   # Interrupt handler setup
    "func_8000E940",   # PI DMA variant
    "func_80014D38",   # PI large DMA handler
    "func_800153DC",   # PI DMA callback
    "func_80015718",   # PI DMA variant
    "func_80015768",   # PI DMA variant
    "func_8000FD70",   # SP status read
    "func_8000FD80",   # SP status write
    "func_8000FE50",   # SP status read variant
    "func_8000FFA0",   # SI operations
    "func_80014D00",   # SI raw read IO
    "func_8000F9D0",   # SP status read
    "func_800155B0",   # PI EPI functions
    "func_800156B0",   # PI raw DMA
    "func_800157B0",   # PI write IO
    "func_80015800",   # PI init
]

