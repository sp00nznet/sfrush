    "func_8000E7A4",   # PI: osPiStartDma / DMA setup
    "func_8000E940",   # PI: DMA operations
    "func_8000EA20",   # PI: osEPiStartDma
    "func_8000EC50",   # PI: osCreatePiManager / PI handler
    "func_8000F510",   # VI: osViSetMode
    "func_8000F660",   # VI: osViSwapBuffer / VI handler
    "func_8000F9C0",   # COP0: read Count register
    "func_8000F9D0",   # SP: read SP status
