# N64Recomp configuration for San Francisco Rush: Extreme Racing (USA)
# Midway / Atari Games - 1997

[input]
entrypoint = 0x80000400
rom_file_path = "sfrush_recomp.z64"
symbols_file_path = "symbols/sfrush.us.syms.toml"
output_func_path = "RecompiledFuncs"
functions_per_output_file = 50
single_file_output = false
uses_mips3_float_mode = true

# Patches section
[patches]
# Stubbed functions - cannot be statically recompiled to C:
#   External calls:
#     func_800005D8 - main thread, decompresses+loads game code, calls 0x800BD440
#     func_800162CC - massive OS/hardware function (RSP, TLB, cache, external calls)
#   CACHE instructions (no-op on PC):
#     func_80004650, func_800046D0, func_800054B0, func_8000E250
#   64-bit FPU (trunc.l, cvt.l, dmfc1/dmtc1):
#     func_80006DC0
#   COP0 registers (Cause, EPC):
#     func_8000D8F0 - reads/writes Cause/EPC registers
#     func_8000E0C4 - writes EPC, TLB operations
#   TLB operations (virtual memory, not needed on PC):
#     func_8000E2D0 - TLB probe
#     func_80015860 - TLB read/write
stubs = [
    # Boot segment stubs
    "func_80004650",
    "func_800046D0",
    "func_800054B0",
    "func_80006DC0",
    "func_8000D8F0",
    "func_8000E0C4",
    "func_8000E250",
    "func_8000E2D0",
    "func_80015860",
    "func_800162CC",
    "func_8000DE84",
    "func_8000F9C0",
    "func_80015850",
    # Game code stubs (invalid instruction)
    "func_800C38A0",
]

ignored = [
    # func_800005D8: custom implementation in game_init_stubs.cpp
    # Original does LZSS decompress + game init; we skip the decompress
    # (handled by on_game_init callback) and call func_800BD440 directly
    "func_800005D8",
]
renamed = []
